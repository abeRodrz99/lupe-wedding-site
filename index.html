<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emma &amp; James · September 19, 2026</title>
  <meta name="description" content="Join us to celebrate the wedding of Emma and James in Charleston, SC." />
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>

  <!-- ── HERO ──────────────────────────────────────────────────────────── -->
  <header class="hero">

    <div class="hero__botanical hero__botanical--tl" aria-hidden="true">
      <svg viewBox="0 0 260 320" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 310 C32 240,64 200,48 144 C32 88,80 48,96 16"  stroke="#73233C" stroke-width="1.2" fill="none"/>
        <path d="M48 144 C64 128,104 124,120 104"                   stroke="#73233C" stroke-width="0.8" fill="none"/>
        <path d="M64 192 C80 176,124 168,136 148"                   stroke="#73233C" stroke-width="0.8" fill="none"/>
        <ellipse cx="120" cy="102" rx="18" ry="11" fill="#73233C" opacity="0.22" transform="rotate(-30 120 102)"/>
        <ellipse cx="138" cy="146" rx="16" ry="10" fill="#73233C" opacity="0.18" transform="rotate(-15 138 146)"/>
        <circle  cx="96"  cy="16"  r="6"            fill="#73233C" opacity="0.28"/>
      </svg>
    </div>

    <div class="hero__botanical hero__botanical--br" aria-hidden="true">
      <svg viewBox="0 0 260 320" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 310 C32 240,64 200,48 144 C32 88,80 48,96 16"  stroke="#73233C" stroke-width="1.2" fill="none"/>
        <path d="M48 144 C64 128,104 124,120 104"                   stroke="#73233C" stroke-width="0.8" fill="none"/>
        <path d="M64 192 C80 176,124 168,136 148"                   stroke="#73233C" stroke-width="0.8" fill="none"/>
        <ellipse cx="120" cy="102" rx="18" ry="11" fill="#73233C" opacity="0.22" transform="rotate(-30 120 102)"/>
        <ellipse cx="138" cy="146" rx="16" ry="10" fill="#73233C" opacity="0.18" transform="rotate(-15 138 146)"/>
        <circle  cx="96"  cy="16"  r="6"            fill="#73233C" opacity="0.28"/>
      </svg>
    </div>

    <div class="hero__inner">
      <p class="hero__eyebrow t-eyebrow">Together with their families</p>
      <h1 class="hero__names" id="hero-names"></h1>
      <div class="hero__rule"></div>
      <p class="hero__date" id="hero-date"></p>
      <nav class="hero__nav" aria-label="Page sections">
        <a href="#details">Details</a>
        <span aria-hidden="true">·</span>
        <a href="#rsvp">RSVP</a>
      </nav>
    </div>

  </header>

  <main>

    <!-- ── DETAILS ─────────────────────────────────────────────────────── -->
    <section id="details" class="section">
      <p class="t-section-label">The Wedding</p>
      <h2 class="t-heading">Details</h2>
      <div class="cards" id="cards"></div>
    </section>

    <!-- ── TRAVEL ──────────────────────────────────────────────────────── -->
    <section id="travel" class="section section--tinted">
      <p class="t-section-label">Travel &amp; Stay</p>
      <h2 class="t-heading">Getting There</h2>
      <div class="hotel" id="hotel-block"></div>
      <div class="directions">
        <p class="t-section-label t-section-label--left">Getting Here</p>
        <p class="directions__body" id="directions-body"></p>
      </div>
    </section>

    <!-- ── RSVP ────────────────────────────────────────────────────────── -->
    <section id="rsvp" class="section section--dark">
      <p class="t-section-label t-section-label--gold" id="rsvp-deadline"></p>
      <h2 class="t-heading t-heading--light">RSVP</h2>

      <div id="rsvp-form-wrap">
        <div class="rsvp-form">

          <div class="field">
            <label for="name">Full Name</label>
            <input id="name" name="name" type="text" placeholder="Emma &amp; James Smith" autocomplete="name" />
            <span class="field__error-msg">Please enter your name.</span>
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" placeholder="your@email.com" autocomplete="email" />
            <span class="field__error-msg">Please enter your email.</span>
          </div>

          <div class="field-row">
            <div class="field">
              <label for="attending">Attending?</label>
              <select id="attending" name="attending">
                <option value="yes">Joyfully Accepts</option>
                <option value="no">Regretfully Declines</option>
              </select>
            </div>
            <div class="field">
              <label for="guests">Guests</label>
              <select id="guests" name="guests">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label for="dietary">Dietary Restrictions</label>
            <input id="dietary" name="dietary" type="text" placeholder="None, vegetarian, gluten-free…" />
          </div>

          <button id="rsvp-submit" class="btn btn--gold">Send RSVP</button>

        </div>
      </div>
    </section>

  </main>

  <!-- ── FOOTER ─────────────────────────────────────────────────────────── -->
  <footer class="footer">
    <p class="footer__names" id="footer-names"></p>
    <p class="footer__sub"   id="footer-sub"></p>
  </footer>

  <script type="module" src="./main.js"></script>
</body>
</html>
