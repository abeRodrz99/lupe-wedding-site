<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guadalupe &amp; Orlando</title>
  <meta name="description" content="Join us to celebrate the wedding of Guadalupe and Orlando in Armadillo de los Infante, S.L.P." />
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>

  <nav class="site-nav" aria-label="Site Navigation">
    <a href="#details">Details</a>
    <a href="#travel">Travel</a>
    <a href="#rsvp">RSVP</a>
  </nav>

  <header class="hero">
    <!-- Hero Botanical SVGs remain unchanged -->
    <div class="hero__inner">
      <p class="hero__eyebrow t-eyebrow">Together with their families</p>
      <h1 class="hero__names" id="hero-names"></h1>
      <div class="hero__rule"></div>
      <p class="hero__date" id="hero-date"></p>
      <nav class="hero__nav" aria-label="Page sections">
        <a href="#details">Details</a>
        <span aria-hidden="true">·</span>
        <a href="#travel">Travel</a>
        <span aria-hidden="true">·</span>
        <a href="#rsvp">RSVP</a>
      </nav>
      <div id="calendar-button"></div>
    </div>
  </header>

  <main>
    <section id="details" class="section">
      <p class="t-section-label">The Wedding</p>
      <h2 class="t-heading">Details</h2>
      <div class="cards" id="cards"></div>
    </section>

    <section id="travel" class="section section--tinted">
      <p class="t-section-label">Travel &amp; Stay</p>
      <h2 class="t-heading">Getting There</h2>
      <div class="hotel" id="hotel-block"></div>
      <div class="directions">
        <p class="t-section-label t-section-label--left">Getting Here</p>
        <p class="directions__body" id="directions-body"></p>
      </div>
    </section>

    <section id="rsvp" class="section section--dark">
      <p class="t-section-label t-section-label--gold" id="rsvp-deadline"></p>
      <h2 class="t-heading t-heading--light">RSVP</h2>

      <div id="rsvp-form-wrap">
        <div class="rsvp-form">
          <div class="field">
            <label for="name">First & Last Name</label>
            <input id="name" name="name" type="text" placeholder="Emma &amp; James Smith" autocomplete="name" />
            <!-- Status message container for validation feedback -->
            <div id="rsvp-status-msg" style="color: var(--gold); margin-top: 0.5rem; font-size: 0.9rem;"></div>
            <span class="field__error-msg">Please enter your name.</span>
          </div>

          <div id="hidden-rsvp-fields" style="display: none;">
            <div class="field">
              <label for="contact">Email or Phone Number</label>
              <input id="contact" name="contact" type="text" placeholder="your@email.com or +1 555 000 0000" autocomplete="contact" />
              <span class="field__error-msg">Please enter your contact information.</span>
            </div>

            <div class="field-row">
              <div class="field">
                <label for="attending">Attending?</label>
                <select id="attending" name="attending">
                  <option value="yes">Joyfully Accepts</option>
                  <option value="no">Regretfully Declines</option>
                </select>
              </div>
              <div class="field">
                <label for="guests">Guests</label>
                <select id="guests" name="guests">
                  <option value="0">0</option>
                  <option value="1">1</option>
                  <option value="2">2</option>
                  <option value="3">3</option>
                  <option value="4">4</option>
                </select>
              </div>
            </div>

            <div id="guest-names-container" class="hidden">
              <label>Names of your guests</label>
              <div id="dynamic-guest-inputs"></div>
            </div>

            <div class="field">
              <label for="dietary">Dietary Restrictions</label>
              <input id="dietary" name="dietary" type="text" placeholder="None, vegetarian, gluten-free…" />
            </div>
          </div> 
          
          <button id="rsvp-submit" class="btn btn--gold">Find My Invitation</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p class="footer__names" id="footer-names"></p>
    <p class="footer__sub" id="footer-sub"></p>
  </footer>

  <script type="module" src="./main.js"></script>
</body>
</html>
